    function expandSynonyms(modes) {
    for (const mode of Object.values(modes)) {
      for (const [key, value] of Object.entries({...mode})) {

        if (key.includes("|")) {
          delete mode[key];

          key.split("|").forEach(k => {
            mode[k.trim()] = value;
          });
        }

      }
    }
  }

        { pattern: /\bit's\b/gi, replacement: "it is" },
        { pattern: /\bwouldn't\b/gi, replacement: "would not" },

        // Emotion reframed as state
        { pattern: /\bi am afraid\b/gi, replacement: "my breath is troubled" },
        { pattern: /\bi am angry\b/gi, replacement: "fire stirs within me" },

        // Future softened into inevitability
        { pattern: /\bwill\b/gi, replacement: "shall" },

        // Possession made explicit (keep late, it’s aggressive)
        { pattern: /\bmy\b/gi, replacement: "that which is mine" },

        // Emphasis
        { pattern: /\bvery\b/gi, replacement: "most" }
      ],
      coptic: [
        // Copula emphasis
        { pattern: /\bi am\b/gi, replacement: "I exist as" },
        { pattern: /\byou are\b/gi, replacement: "you exist as" },
        { pattern: /\bit is\b/gi, replacement: "it exists as" },

        // Possession externalization
        { pattern: /\bmy (\w+)\b/gi, replacement: "the $1 of me" },
        { pattern: /\byour (\w+)\b/gi, replacement: "the $1 of you" },
        { pattern: /\bhis (\w+)\b/gi, replacement: "the $1 of him" },
        { pattern: /\bher (\w+)\b/gi, replacement: "the $1 of her" },
        { pattern: /\btheir (\w+)\b/gi, replacement: "the $1 of them" },

        // De-agentification
        { pattern: /\bi decided to\b/gi, replacement: "it came to pass that I" },
        { pattern: /\bi want to\b/gi, replacement: "there is desire within me to" },

        // Causal phrasing
        { pattern: /\bbecause\b/gi, replacement: "for this reason" },

      ]
    };

    const regexReplacements = regexByMode[mode] || [];

    //detects if decontractions should be preformed, preforms, it, then applies corrections as needed.
    if (decontract == true) {
      contractionList.forEach(({ pattern, replacement }) => {
        text = text.replace(pattern, replacement);
      });
    }
    regexReplacements.forEach(({ pattern, replacement }) => {
        text = text.replace(pattern, replacement);
      });



    // Capitalize after . ! ?
    text = text.replace(/([.!?])\s+([a-z])/g, (match, p1, p2) => p1 + " " + p2.toUpperCase());

    // Capitalize first character of the text
    text = text.charAt(0).toUpperCase() + text.slice(1);

    document.getElementById("output").value = text;

    // Copy to clipboard automatically
    navigator.clipboard.writeText(text).catch(err => {
      console.error("Clipboard copy failed:", err);
    });
  }

  //Fixes casing issues after conversion.
  function matchCase(original, replacement) {
    if (original === original.toUpperCase()) {
      return replacement.toUpperCase();
    }
    if (original[0] === original[0].toUpperCase()) {
      return replacement[0].toUpperCase() + replacement.slice(1);
    }
    return replacement;
  }

  // Allows scroll wheel to change dropdown selection
  document.getElementById("accentMode").addEventListener("wheel", (event) => {
    event.preventDefault();
    const select = event.currentTarget;
    let newIndex = select.selectedIndex + (event.deltaY > 0 ? 1 : -1);
    if (newIndex < 0) newIndex = select.options.length - 1;
    if (newIndex >= select.options.length) newIndex = 0;
    select.selectedIndex = newIndex;
  });

  //Trigger to update writing guide on page load.
  window.addEventListener("DOMContentLoaded", updateWritingGuide);
  </script>
</body>
